  <script>
    // Hide section heading if no cards are visible
    function checkVisibleCards() {
      const sections = [
        { gridId: 'maps-grid', headingId: 'routes-heading-section' },
        { gridId: 'buses-grid', headingId: 'buses-heading-section' },
        { gridId: 'devfiles-grid', headingId: 'devfiles-heading-section' }
      ];

      sections.forEach(({ gridId, headingId }) => {
        const grid = document.getElementById(gridId);
        const heading = document.getElementById(headingId);

        if (grid && heading) {
          const cards = grid.querySelectorAll('.card');
          const visibleCards = Array.from(cards).filter(card => {
            return card.offsetParent !== null;
          });

          if (visibleCards.length === 0) {
            heading.style.display = 'none';
          } else {
            heading.style.display = 'block';
          }
        }
      });
    }

    // Perform search filtering
    function performSearch() {
      const searchInput = document.getElementById('search-input');
      if (!searchInput) return;

      const searchTerm = searchInput.value.toLowerCase();
      const cards = document.querySelectorAll('.wbnrfz-grid .card');

      cards.forEach(card => {
        const title = card.querySelector('h3').textContent.toLowerCase();
        if (title.includes(searchTerm)) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });

      checkVisibleCards();
    }

    // Wait for page to fully load before initial check
    window.addEventListener('load', function () {
      setTimeout(function () {
        checkVisibleCards();

        // Check on search input (keyup and input events)
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
          searchInput.addEventListener('keyup', function () {
            setTimeout(performSearch, 50);
          });
          searchInput.addEventListener('input', function () {
            setTimeout(performSearch, 50);
          });
        }

        // Check on filter change
        document.querySelectorAll('.btn-filter').forEach(btn => {
          btn.addEventListener('click', function () {
            setTimeout(checkVisibleCards, 100);
          });
        });

        // Check on sort change
        const sortOptions = document.getElementById('sort-options');
        if (sortOptions) {
          sortOptions.addEventListener('change', function () {
            setTimeout(checkVisibleCards, 100);
          });
        }
      }, 500);
    });
  </script>
